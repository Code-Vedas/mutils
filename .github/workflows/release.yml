name: Release
permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    tags:
      - v*

concurrency:
  group: release
  cancel-in-progress: true

env:
  APP_DIR: ${{ github.workspace }}/mutils
  RUBY_VERSION: 3.4

jobs:
  verify_release:
    name: Verify release
    permissions:
      contents: read
    uses: ./.github/workflows/shared-ci.yml
    secrets: inherit
    with:
      upload_coverage: false

  publish_mutils:
    name: Publish mutils
    runs-on: ubuntu-latest
    needs: [verify_release]
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: ${{ env.APP_DIR }}
      - name: Configure RubyGems Credentials
        uses: rubygems/configure-rubygems-credentials@762a4b77c3300434bb57c7ce80b20e36231927aa
      - name: Build and push gem
        working-directory: ${{ env.APP_DIR }}
        run: |
          gem build mutils.gemspec
          gem push mutils-*.gem
