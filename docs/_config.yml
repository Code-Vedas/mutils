title: Mutils
description: >-
  Mutils is a small Ruby serializer DSL for building explicit JSON output in Ruby and Rails apps.
baseurl: ""
domain: mutils.codevedas.com
repository: Code-Vedas/mutils
# Build settings
theme: just-the-docs
plugins:
  - jekyll-feed
  - kramdown
mermaid:
  version: 10.1.0
logo: /assets/images/logo.svg
callouts:
  note:
    title: Note
    color: blue
toc:
  depth: 2
  min_heading_level: 2
  max_heading_level: 3
aux_links:
  - title: " 🌙 / ☀️ "
    url: javascript:toggleTheme();
    new_tab: false
  - title: Repository
    url: https://github.com/Code-Vedas/mutils
    new_tab: true
aux_links_new_tab: true
nav_enabled: true
heading_anchors: true
enable_copy_code_button: true
